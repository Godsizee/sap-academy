version: '3.8'

services:
  sap-academy-app:
    build: .
    container_name: sap-academy-web
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
    volumes:
      # Spiegelt den Portainer-Git-Ordner live in den Container.
      # Künftige Webhook-Updates sind sofort aktiv, ohne Rebuild.
      - .:/var/www/html